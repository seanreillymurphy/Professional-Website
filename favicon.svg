<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- No background - fully transparent -->
  
  <!-- Define stroke style for outline effect -->
  <defs>
    <style>
      .outlined-text {
        fill: #FFFFFF;
        stroke: #000000;
        stroke-width: 1.5;
        stroke-linejoin: round;
        paint-order: stroke fill;
      }
    </style>
  </defs>
  
  <!-- Hello text on top line with outline -->
  <text x="16" y="14" 
        font-family="'Courier New', Courier, monospace" 
        font-size="10" 
        font-weight="bold" 
        text-anchor="middle" 
        class="outlined-text">Hello</text>
  
  <!-- World text on bottom line with outline -->
  <text x="16" y="24" 
        font-family="'Courier New', Courier, monospace" 
        font-size="10" 
        font-weight="bold" 
        text-anchor="middle" 
        class="outlined-text">World</text>
</svg>
